services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: resume_agent
      POSTGRES_PASSWORD: resume_agent
      POSTGRES_DB: resume_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  qdrant_data:
  redis_data:
  postgres_data: